spring:
  application:
    name: farmdigitaltwin

  datasource:
    url: jdbc:postgresql://13.203.86.187:5436/farm_twin
    username: postgres
    password: Employee@123
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Custom Application Settings
app:
  jwt:
    secret: farm_digital_twin_platform_secret_key_jwt_token_auth_2026_spring_boot_3_java_21_jwt_key
    expiration-ms: 86400000 # 24 Hours
  upload:
    dir: uploads

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.company.farmdigitaltwin: DEBUG

server:
  port: 8082
  error:
    include-message: always
